name: check

# Gate for the docs site. Mintlify deploys this repo on push to main, so this is
# the only thing standing between a bad commit and a broken production docs site.
# Runs on PRs (the merge gate) and on push to main (a post-merge alarm).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Cheap structural guard: every openapi nav group must have a `pages`
      #    key (dropping it 404s the whole API Reference - incident 2026-07-08).
      - name: docs.json nav guard
        run: bash scripts/check-docs-nav.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Mintlify CLI
        run: npm install -g mint

      # 2. Real build check: every OpenAPI path must produce an API Reference
      #    page. Counts generated /api-reference/* pages from the dev server
      #    sitemap and asserts it equals the number of paths in openapi.json.
      #    This is what catches "the reference silently disappeared" - a plain
      #    broken-links pass does NOT, because nothing links to missing pages.
      - name: API Reference page-count assertion
        run: |
          set -euo pipefail
          mint dev --port 3123 > /tmp/mint-dev.log 2>&1 &
          for _ in $(seq 1 90); do
            grep -qiE "preview ready" /tmp/mint-dev.log && break
            sleep 2
          done
          if ! grep -qiE "preview ready" /tmp/mint-dev.log; then
            echo "::error::mint dev failed to start"
            cat /tmp/mint-dev.log
            exit 1
          fi
          port=$(grep -oE "localhost:[0-9]+" /tmp/mint-dev.log | head -1 | cut -d: -f2)
          gen=$(curl -s "http://localhost:$port/sitemap.xml" \
            | grep -oE "/api-reference/[a-z0-9-]+/[a-z0-9-]+" | sort -u | wc -l | tr -d ' ')
          want=$(python3 -c "import json; print(len(json.load(open('openapi.json'))['paths']))")
          echo "generated API Reference pages: $gen ; openapi.json paths: $want"
          pkill -f "mint dev" 2>/dev/null || true
          if [ "$gen" -eq 0 ] || [ "$gen" -ne "$want" ]; then
            echo "::error::API Reference page count ($gen) != openapi path count ($want). The reference may have been dropped - check the docs.json 'API Reference' nav group."
            exit 1
          fi

      # 3. Link integrity across the whole site.
      - name: broken links
        run: mint broken-links
